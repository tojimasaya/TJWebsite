    <style>
        body { margin: 0; padding: 0; background: #f8f7f4; }

        .map-header {

            font-family: 'Noto Serif JP', serif;
        }
        .map-back-link:hover { text-decoration: underline; }
        .map-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.6rem;
            font-weight: 600;

        }
        .map-subtitle {
            font-family: 'Noto Serif JP', serif;

        /* Map container */
        #map {
            width: 100%;
            height: calc(100vh - 180px);
            min-height: 400px;
            border-top: 1px solid #e5e5e5;
        }

        /* Custom numbered markers */
        .shirasagi-marker {
            background: #1A3FB9;
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .shirasagi-marker:hover {
            transform: scale(1.3);
            z-index: 1000 !important;
        }

        /* Popup styling */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 0;
        }
        .leaflet-popup-content {
            margin: 0;
            min-width: 220px;

            font-family: 'Noto Serif JP', serif;
        }
        .popup-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
            display: block;
        }
        .popup-body {
            padding: 12px 14px;
        }
        .popup-number {

            font-size: 0.7rem;

            text-transform: uppercase;

        .popup-title {
            font-size: 0.95rem;
            font-weight: 600;

            margin-bottom: 4px;

            display: inline-block;
            font-size: 0.78rem;

<body>
    <!-- Navigation -->
    <script src="js/site-header.js"></script>

    <header class="map-header">
        <a href="shirasagi36.html#gallery-anchor" class="map-back-link">← 白鷺三十六景に戻る</a>
        <h1 class="map-title">撮影地マップ</h1>
        <p class="map-subtitle">全三十六景の撮影ポイントを地図上に表示</p>
    </header>

    <div id="map"></div>

    <p class="map-legend">マーカーをタップすると写真の詳細を確認できます。一部の写真は撮影場所が非公開のため表示されません。</p>

    <footer class="footer"></footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize map centered on Himeji Castle
        const map = L.map('map', {
            center: [34.8389, 134.6939],
            zoom: 15,
            zoomControl: true
        });

        // OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        // Load photo data and add markers
        fetch('assets/images/shirasagi/photos.json')
            .then(res => res.json())
            .then(data => {
                const markers = [];

                Object.keys(data).sort((a, b) => Number(a) - Number(b)).forEach(id => {
                    const photo = data[id];
                    const loc = photo.location;

                    // Skip photos without coordinates
                    if (!loc || !loc.lat || !loc.lng) return;

                    const num = String(id).padStart(2, '0');
                    const thumbUrl = `assets/images/shirasagi/webp/thumb/${num}.webp`;

                    // Create numbered marker
                    const icon = L.divIcon({
                        className: '',
                        html: `<div class="shirasagi-marker">${id}</div>`,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14],
                        popupAnchor: [0, -18]
                    });

                    const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);

                    // Popup content
                    const locationName = loc.name ? `<div class="popup-location">📍 ${loc.name}</div>` : '';
                    const popupHtml = `
                        <div class="popup-inner">
                            <img src="${thumbUrl}" alt="${photo.title}" class="popup-thumb" loading="lazy"
                                 onerror="this.src='assets/images/shirasagi/${num}.jpg'">
                            <div class="popup-body">
                                <div class="popup-number">No.${id}</div>
                                <div class="popup-title">${photo.title}</div>
                                ${locationName}
                                <a href="shirasagi36.html#view-${num}" class="popup-link">詳しく見る →</a>
                            </div>
                        </div>
                    `;

                    marker.bindPopup(popupHtml, {
                        maxWidth: 260,
                        minWidth: 220,
                        closeButton: true
                    });

                    markers.push(marker);
                });

                // Fit map to show all markers
                if (markers.length > 0) {
                    const group = L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.1));
                }
            })
            .catch(err => {
                console.error('Failed to load photo data:', err);
                document.getElementById('map').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">地図データの読み込みに失敗しました。</p>';
            });
    </script>
</body>
