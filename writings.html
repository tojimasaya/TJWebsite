    <style>
        /* Writings Page Specific Styles */
        
        .writings-hero {
            padding: 140px 20px 40px;
            text-align: center;
            background-color: var(--bg-color);
        }

        .writings-title {
            font-family: 'Crimson Text', serif;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
            font-weight: 400;
        }

        .writings-subtitle {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.1rem;
            color: var(--text-light);
            letter-spacing: 0.05em;
        }

        /* Filter Tabs */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 60px;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 24px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-light);
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--secondary-font);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--text-color);
            color: var(--text-color);
            background: rgba(0,0,0,0.05);
        }

        /* Grid Layout */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 30px;
        }

        .article-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0; /* Animation start state */
        }

        .article-card.visible {
            opacity: 1;
        }

        .article-card:hover {
            transform: translateY(-5px);
        }

        .article-image-wrapper {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
            border-radius: 4px;
            margin-bottom: 1.2rem;
            background-color: #f0f0f0;
        }

        .article-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .article-card:hover .article-image {
            transform: scale(1.05);
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-family: var(--secondary-font);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .article-source {
            font-weight: 600;
            color: var(--accent-color);
        }

        .article-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 0.8rem;
            color: var(--text-color);
            transition: color 0.3s ease;
        }

        .article-card:hover .article-title {
            color: var(--accent-color);
        }

        .article-excerpt {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Loading Message */
        .loading-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-family: var(--secondary-font);
        }

        /* 共通ヘッダースクリプト用に追加のスタイルが必要ならここに */
        .featured-link {
            color: #1A3FB9 !important;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .featured-link:hover {
            background-color: rgba(26, 63, 185, 0.05);
            border-radius: 4px;
        }

        /* Pick Up Section */
        .pickup-section {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 30px;
        }

        .pickup-heading {
            font-family: 'Crimson Text', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-align: center;
        }

        .pickup-heading span {
            display: block;
            font-family: 'Noto Serif JP', serif;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.3rem;
            letter-spacing: 0.1em;
        }

        .pickup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .pickup-card {
            display: flex;
            gap: 16px;
            text-decoration: none;
            color: inherit;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            align-items: center;
        }

        .pickup-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .pickup-card-image {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .pickup-card-body {
            flex: 1;
            min-width: 0;
        }

        .pickup-card-source {
            font-family: var(--secondary-font);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .pickup-card-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.3s ease;
        }

        .pickup-card:hover .pickup-card-title {
            color: var(--accent-color);
        }

        .pickup-divider {
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 30px;
            border: none;
            border-top: 1px solid var(--border-color);
        }

        @media (prefers-color-scheme: dark) {
            .filter-btn:hover, .filter-btn.active {
                background: rgba(255,255,255,0.1);
                border-color: #fff;
                color: #fff;
            }
            .article-image-wrapper { background-color: #333; }
            .pickup-card {
                border-color: rgba(255,255,255,0.15);
            }
            .pickup-card:hover {
                box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            }
        }

        @media (max-width: 768px) {
            .writings-title { font-size: 2.5rem; }
            .articles-grid { grid-template-columns: 1fr; gap: 40px; }
            .pickup-grid { grid-template-columns: 1fr; }
            .pickup-card-image { width: 100px; height: 68px; }
        }
    </style>

<body>

    <!-- Navigation (Injected by JS) -->
    <script src="js/site-header.js"></script>
    <script src="js/image-fallback.js"></script>

    <header class="writings-hero">
        <h1 class="writings-title">Writings</h1>
        <p class="writings-subtitle">旅の記録、機材の考察、日々の思考。</p>
    </header>

    <section class="pickup-section" id="pickup-section" style="display:none">
        <h2 class="pickup-heading">Pick Up<span>おすすめ記事</span></h2>
        <div class="pickup-grid" id="pickup-grid"></div>
    </section>
    <hr class="pickup-divider" id="pickup-divider" style="display:none">

    <div class="filter-container">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="note">note</button>
        <button class="filter-btn" data-filter="drone">DRONE.jp</button>
    </div>

    <main class="articles-grid" id="articles-container">
        <p class="loading-message">Loading...</p>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; <script>document.write(new Date().getFullYear())</script> Toji Masaya. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 記事データの保持用
        let allArticles = [];

        async function fetchArticles() {
            const container = document.getElementById('articles-container');

            try {
                // 記事一覧とOGPキャッシュを並行読み込み
                const [articlesRes, ogRes] = await Promise.all([
                    fetch('data/articles.json'),
                    fetch('data/writings-og.json').catch(() => null)
                ]);
                if (!articlesRes.ok) throw new Error('Failed to load articles.json');
                const data = await articlesRes.json();

                // OGPキャッシュ（ローカル画像パス）を読み込み
                let ogMap = {};
                if (ogRes && ogRes.ok) {
                    try { ogMap = await ogRes.json(); } catch {}
                }

                // ローカルキャッシュ画像があれば優先的に使用
                for (const article of data) {
                    const cached = ogMap[article.link];
                    if (cached && cached.local) {
                        let localPath = cached.local;
                        if (localPath.startsWith('/')) localPath = localPath.substring(1);
                        article.localImage = localPath;
                    }
                }

                // 日付で降順ソート
                allArticles = data.sort((a, b) => new Date(b.date) - new Date(a.date));

                renderArticles(allArticles);
                renderPickup(allArticles, ogMap);

                // ローカルキャッシュが実際に存在する場合のみ画像を差し替え（非同期）
                upgradeToLocalImages();

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="loading-message">記事の読み込みに失敗しました。</p>';
            }
        }

        // ローカルキャッシュ画像が存在する場合のみ差し替える
        function upgradeToLocalImages() {
            allArticles.forEach(article => {
                if (!article.localImage) return;
                const testImg = new Image();
                testImg.onload = () => {
                    // ローカル画像が読み込めた → 該当カードの画像を差し替え
                    const card = document.querySelector(`a.article-card[href="${article.link}"] .article-image`);
                    if (card) card.src = article.localImage;
                };
                // onloadが発火しなければ何もしない（外部URLのまま）
                testImg.src = article.localImage;
            });
        }

        function renderPickup(articles, ogMap) {
            const featured = articles.filter(a => a.featured);
            if (featured.length === 0) return;

            const section = document.getElementById('pickup-section');
            const divider = document.getElementById('pickup-divider');
            const grid = document.getElementById('pickup-grid');

            grid.innerHTML = '';
            featured.forEach(article => {
                let imgSrc = article.image || 'assets/images/gallery/weekly.jpg';
                const cached = ogMap[article.link];
                if (cached && cached.local) {
                    let lp = cached.local;
                    if (lp.startsWith('/')) lp = lp.substring(1);
                    imgSrc = lp;
                }

                const sourceColor = article.source === 'note' ? '#41C9B4' : '#2563eb';

                const card = document.createElement('a');
                card.href = article.link;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.className = 'pickup-card';
                card.innerHTML = `
                    <img src="${imgSrc}" alt="${article.title}" class="pickup-card-image" loading="lazy" decoding="async" onerror="this.src='assets/images/gallery/weekly.jpg'">
                    <div class="pickup-card-body">
                        <div class="pickup-card-source" style="color:${sourceColor}">${article.sourceLabel}</div>
                        <div class="pickup-card-title">${article.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            section.style.display = '';
            divider.style.display = '';
        }

        function renderArticles(articles) {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            if (articles.length === 0) {
                container.innerHTML = '<p class="loading-message">記事がありません。</p>';
                return;
            }

            articles.forEach((article, index) => {
                const dateObj = new Date(article.date);
                const dateStr = dateObj.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
                
                const card = document.createElement('a');
                card.href = article.link;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.className = 'article-card';
                // 段階的に表示させるアニメーション設定
                card.style.animation = `fadeInUp 0.5s ease ${index * 0.05}s forwards`;
                
                // 画像処理（外部URL優先、ローカルキャッシュがあれば差し替え）
                let imgSrc = article.image;
                if (!imgSrc) imgSrc = 'assets/images/gallery/weekly.jpg';
                if (imgSrc.startsWith('/')) imgSrc = imgSrc.substring(1);

                card.innerHTML = `
                    <div class="article-image-wrapper">
                        <img src="${imgSrc}" alt="${article.title}" class="article-image" loading="lazy" decoding="async" onerror="this.src='assets/images/gallery/weekly.jpg'">
                    </div>
                    <div class="article-meta">
                        <span class="article-source" style="color: ${article.source === 'note' ? '#41C9B4' : '#2563eb'}">${article.sourceLabel}</span>
                        <span>|</span>
                        <time>${dateStr}</time>
                    </div>
                    <h2 class="article-title">${article.title}</h2>
                    <p class="article-excerpt">${article.excerpt}</p>
                `;
                container.appendChild(card);
            });
        }

        // アニメーション定義
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleSheet);

        // フィルター機能
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                const filter = e.target.dataset.filter;
                if (filter === 'all') {
                    renderArticles(allArticles);
                } else {
                    const filtered = allArticles.filter(a => a.source === filter);
                    renderArticles(filtered);
                }
            });
        });

        // 初期化
        document.addEventListener('DOMContentLoaded', fetchArticles);
    </script>
    <script src="/assets/js/ga4-tracking.js" defer></script>
