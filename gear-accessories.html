<body>
    <!-- Navigation will be injected by site-header.js -->

    <header class="detail-hero">
        <a href="gear.html" class="detail-back-link">← Back to Categories</a>
        <h1>Accessories</h1>
        <p>Bags, Power, Tripods. Essential tools.</p>
    </header>

    <div class="detail-grid" id="accessories-grid">Loading...</div>

    <footer class="footer"></footer>

    <script src="js/site-header.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('accessories-grid');
            try {
                const response = await fetch('data/gear.json');
                if (!response.ok) throw new Error('Data could not be loaded.');
                const data = await response.json();
                if (data.categories.accessories) {
                    renderGrid('accessories-grid', data.categories.accessories.items);
                } else {
                    grid.innerText = 'Data could not be loaded.';
                }
            } catch (error) {
                console.error('Error loading gear data:', error);
                grid.innerText = 'Data could not be loaded.';
            }
        });

        function linkRel(url) {
            const host = new URL(url, window.location.href).hostname;
            const isSponsored = host === 'amzn.to' || host.includes('amazon.');
            return isSponsored ? 'noopener noreferrer sponsored' : 'noopener noreferrer';
        }

        function newBadge(item) {
            return item.is_new ? `<span class="gear-new-badge">${item.new_label || 'NEW'}</span>` : '';
        }

        function renderGrid(id, items) {
            const container = document.getElementById(id);
            container.innerHTML = items.map(item => {
                const webpSrc = item.image.replace(/\.(jpg|jpeg|png)$/, '.webp');
                return `
                <article class="gear-item">
                    <div class="gear-img-box">${newBadge(item)}<picture><source srcset="${webpSrc}" type="image/webp"><img src="${item.image}" alt="${item.name}" class="gear-img" loading="lazy" onerror="this.onerror=null;this.src='assets/images/gear/accessories.jpg'"></picture></div>
                    <div class="gear-content">
                        <h3 class="gear-name">${item.name}</h3>
                        <div class="gear-specs">
                            ${item.specs ? item.specs.map(s => `<span class="spec-tag">${s}</span>`).join('') : ''}
                        </div>
                        <p class="gear-desc">${item.description}</p>
                        <div class="gear-links">${Object.entries(item.links || {}).map(([key, url]) => `<a href="${url}" target="_blank" rel="${linkRel(url)}">${key} →</a>`).join('')}</div>
                    </div>
                </article>`}).join('');
        }
    </script>
    <script src="/assets/js/ga4-tracking.js" defer></script>
    <script src="/growth.js" defer></script>
</body>
