    <style>
        .frag-head { max-width: 720px; margin: 120px auto 0; padding: 0 24px; text-align: center; }
        .frag-kicker { font-family: var(--secondary-font); font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-lighter, #999); }
        .frag-head h1 { font-family: 'Noto Serif JP', serif; font-size: clamp(1.7rem, 4vw, 2.3rem); font-weight: 600; margin: 14px 0 16px; color: var(--text-color); letter-spacing: 0.08em; }
        .frag-lead { font-family: var(--primary-font); font-size: 0.9rem; color: var(--text-light); line-height: 2; }
        .frag-feed { max-width: 680px; margin: 26px auto 40px; padding: 0 24px; }
        .frag { padding: 46px 0; border-bottom: 1px solid var(--border-color); scroll-margin-top: 90px; }
        .frag:last-child { border-bottom: 0; }
        .frag figure { margin: 0; }
        .frag figure img { width: 100%; height: auto; border-radius: 12px; border: 1px solid var(--border-color); display: block; }
        .frag figcaption { font-family: var(--primary-font); font-size: 0.78rem; color: var(--text-light); text-align: center; margin-top: 8px; }
        .frag-sides { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .frag-sides button { padding: 0; border: 0; background: none; cursor: pointer; border-radius: 8px; overflow: hidden; transition: transform .2s ease, box-shadow .2s ease; }
        .frag-sides button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
        .frag-sides img { width: 100%; height: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); display: block; }
        .frag-hint { font-family: var(--primary-font); font-size: 0.72rem; color: var(--text-lighter, #999); text-align: center; margin: 6px 0 0; }
        .frag-meta { font-family: var(--primary-font); font-size: 0.78rem; color: var(--text-lighter, #999); margin: 18px 0 6px; letter-spacing: 0.04em; }
        .frag-meta a { color: inherit; text-decoration: none; }
        .frag-meta a:hover { color: var(--accent-color); }
        .frag h2 { font-family: 'Noto Serif JP', serif; font-size: 1.25rem; font-weight: 600; margin: 0 0 0.7em; color: var(--text-color); line-height: 1.7; }
        .frag-body { font-family: 'Noto Serif JP', serif; font-size: 0.98rem; line-height: 2.15; color: var(--text-color); margin: 0; }
        .frag-link { display: inline-block; margin-top: 12px; font-family: var(--primary-font); font-size: 0.85rem; color: var(--accent-color); text-decoration: none; }
        .frag-link:hover { text-decoration: underline; }
        .frag-nav { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin: 40px auto 90px; padding: 0 20px; }
        .frag-nav a { padding: 11px 20px; border-radius: 24px; border: 1px solid var(--border-color); text-decoration: none; font-size: var(--text-sm); color: var(--text-color); font-family: var(--primary-font); }
        .frag-nav a.primary { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .frag-loading { text-align: center; color: var(--text-lighter, #999); font-family: var(--primary-font); font-size: 0.9rem; padding: 40px 0; }
    </style>

    <script type="application/ld+json">
    {"@context": "https://schema.org", "@type": "CollectionPage", "name": "断章 — 写真を入口に、その日の出来事を一文で残す", "description": "姫路と香港、ときどき旅。写真を入口に、その日の出来事を一文で残す小さな記録の全篇アーカイブ。", "url": "https://tojimasaya.com/fragments.html", "author": {"@type": "Person", "name": "田路昌也 (Toji Masaya)", "url": "https://tojimasaya.com/about.html"}, "inLanguage": "ja"}

<body>
    <a href="#main-content" class="skip-link">メインコンテンツにスキップ</a>

    <script src="js/site-header.js"></script>

    <main id="main-content">
        <header class="frag-head">
            <p class="frag-kicker">Fragments</p>
            <h1>断章</h1>
            <p class="frag-lead">写真を入口に、その日の出来事を一文で残しています。<br>姫路と香港、ときどき旅。新しい順に全<span id="frag-count">—</span>篇。</p>
        </header>

        <div class="frag-feed" id="frag-feed">
            <p class="frag-loading">断章を読み込み中…</p>
        </div>

        <div class="frag-nav">
            <a href="/" class="primary">Home</a>
            <a href="shirasagi36.html">白鷺三十六景</a>
            <a href="hongkong-neon.html">香港ネオン残照</a>
        </div>

        <footer class="footer" role="contentinfo"></footer>
    </main>

    <script>
    (async function () {
      const feed = document.getElementById('frag-feed');
      try {
        const res = await fetch('data/recent-photos.json');
        if (!res.ok) throw new Error('load failed');
        const photos = await res.json();
        const list = Array.isArray(photos) ? photos : [];

        const fragment = document.createDocumentFragment();
        list.forEach(function (p) {
          const art = document.createElement('article');
          art.className = 'frag';
          if (p.slug) art.id = p.slug;

          const sides = (p.sideFrames || []).filter(function (sf) { return sf && sf.image; });
          if (p.image) {
            const media = [{ image: p.image, imageWebp: p.imageWebp, alt: p.alt || p.title || '', caption: p.caption || '' }]
              .concat(sides.map(function (sf) {
                return { image: sf.image, imageWebp: sf.imageWebp, alt: sf.alt || sf.title || '', caption: sf.caption || sf.title || '' };
              }));
            let active = 0;

            const fig = document.createElement('figure');
            const pic = document.createElement('picture');
            const src = document.createElement('source');
            src.type = 'image/webp';
            pic.appendChild(src);
            const img = document.createElement('img');
            img.loading = 'lazy';
            img.decoding = 'async';
            pic.appendChild(img);
            fig.appendChild(pic);
            const fc = document.createElement('figcaption');
            fig.appendChild(fc);
            art.appendChild(fig);

            let grid = null;
            let hint = null;
            if (media.length > 1) {
              grid = document.createElement('div');
              grid.className = 'frag-sides';
              art.appendChild(grid);
              hint = document.createElement('p');
              hint.className = 'frag-hint';
              hint.textContent = '小さな写真をタップすると大きく表示されます';
              art.appendChild(hint);
            }

            function renderMedia() {
              const m = media[active];
              if (m.imageWebp) { src.srcset = m.imageWebp; } else { src.removeAttribute('srcset'); }
              img.src = m.image;
              img.alt = m.alt;
              fc.textContent = m.caption;
              fc.style.display = m.caption ? '' : 'none';
              if (!grid) return;
              grid.replaceChildren.apply(grid, media.map(function (mm, i) { return { mm: mm, i: i }; })
                .filter(function (x) { return x.i !== active; })
                .map(function (x) {
                  const btn = document.createElement('button');
                  btn.type = 'button';
                  btn.setAttribute('aria-label', (x.mm.caption || '写真') + 'を大きく表示');
                  btn.addEventListener('click', function () { active = x.i; renderMedia(); });
                  const p2 = document.createElement('picture');
                  if (x.mm.imageWebp) {
                    const s2 = document.createElement('source');
                    s2.srcset = x.mm.imageWebp;
                    s2.type = 'image/webp';
                    p2.appendChild(s2);
                  }
                  const im = document.createElement('img');
                  im.src = x.mm.image;
                  im.alt = x.mm.alt;
                  im.loading = 'lazy';
                  im.decoding = 'async';
                  p2.appendChild(im);
                  btn.appendChild(p2);
                  return btn;
                }));
            }
            renderMedia();
          }

          const meta = document.createElement('p');
          meta.className = 'frag-meta';
          const metaText = [p.place, p.date].filter(Boolean).join(' / ');
          if (p.slug && metaText) {
            const a = document.createElement('a');
            a.href = '#' + p.slug;
            a.title = 'この断章へのリンク';
            a.textContent = metaText;
            meta.appendChild(a);
          } else {
            meta.textContent = metaText;
          }
          art.appendChild(meta);

          const h2 = document.createElement('h2');
          h2.textContent = p.title || '';
          art.appendChild(h2);

          if (p.body) {
            const body = document.createElement('p');
            body.className = 'frag-body';
            body.textContent = p.body;
            art.appendChild(body);
          }

          if (p.link && p.linkLabel) {
            const l = document.createElement('a');
            l.className = 'frag-link';
            l.href = p.link;
            l.textContent = p.linkLabel;
            art.appendChild(l);
          }

          fragment.appendChild(art);
        });

        feed.replaceChildren(fragment);
        const count = document.getElementById('frag-count');
        if (count) count.textContent = list.length;

        if (location.hash) {
          const target = document.getElementById(decodeURIComponent(location.hash.slice(1)));
          if (target) {
            let tries = 0;
            (function settle() {
              target.scrollIntoView({ block: 'start' });
              if (++tries < 6) setTimeout(settle, 250);
            })();
          }
        }
      } catch (e) {
        feed.innerHTML = '<p class="frag-loading">断章を読み込めませんでした。時間をおいて再度お試しください。</p>';
      }
    })();
    </script>

    <script src="js/image-fallback.js"></script>
    <script src="/assets/js/ga4-tracking.js" defer></script>
    <script src="/growth.js" defer></script>
</body>
